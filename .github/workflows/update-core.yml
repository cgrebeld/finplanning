name: Update Core Wheel
on:
  repository_dispatch:
    types: [core-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Core version tag (e.g. v0.1.0). Leave blank for latest."
        required: false

jobs:
  update-core-wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          GH_TOKEN: ${{ secrets.CORE_REPO_TOKEN }}
        run: |
          VERSION="${INPUT_VERSION:-$DISPATCH_VERSION}"
          if [ -z "$VERSION" ]; then
            VERSION=$(gh release view --repo cgrebeld/finplanning-engine --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve Linux x86_64 core wheel asset
        id: wheel
        env:
          GH_TOKEN: ${{ secrets.CORE_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WHEEL_NAME=$(gh release view "$VERSION" \
            --repo cgrebeld/finplanning-engine \
            --json assets \
            -q '.assets[] | select(.name | test("^finplanning_core-.*x86_64\\.whl$")) | .name' \
            | head -1)
          test -n "$WHEEL_NAME"
          echo "wheel_name=$WHEEL_NAME" >> "$GITHUB_OUTPUT"

      - name: Download core wheel into repository
        env:
          GH_TOKEN: ${{ secrets.CORE_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          WHEEL_NAME="${{ steps.wheel.outputs.wheel_name }}"
          mkdir -p wheels
          rm -f wheels/*.whl
          gh release download "$VERSION" \
            --repo cgrebeld/finplanning-engine \
            --pattern "$WHEEL_NAME" \
            --dir wheels/

      - name: Update requirements.txt
        run: |
          WHEEL_NAME="${{ steps.wheel.outputs.wheel_name }}"
          sed -E -i -e 's#^(finplanning-core @ .*|\./wheels/finplanning_core-.*\.whl)$#./wheels/'"$WHEEL_NAME"'#' requirements.txt

      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="core-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt wheels/
          git commit -m "chore: update core wheel to ${VERSION}" || exit 0
          if git ls-remote --exit-code --tags origin "${TAG_NAME}" >/dev/null 2>&1; then
            git push origin main
          else
            git tag "${TAG_NAME}"
            git push origin main --tags
          fi
